_target_: vio_datamodule.VIODataModule
batch_size: 4 # Needs to be divisible by the number of devices (e.g., if in a distributed setup)
num_workers: 0
pin_memory: False
train_loader:
  _target_: KITTI_dataset.KITTI
  _partial_: false
  root: ${paths.data_dir}/kitti_data
  sequence_length: 11
  train_seqs: ['00', '01', '02', '04', '06', '08']
  transform:
    _target_: custom_transform.Compose
    _partial_: false
    transforms: 
      - _target_: custom_transform.ToTensor
      - _target_: custom_transform.Resize
val_loader:
  _target_: KITTI_dataset.KITTI
  _partial_: false
  root: ${paths.data_dir}/kitti_data
  sequence_length: 11
  train_seqs: ['09']
  transform: 
    _target_: custom_transform.Compose
    _partial_: false
    transforms: 
      - _target_: custom_transform.ToTensor
      - _target_: custom_transform.Resize
test_loader:
  _target_: KITTI_dataset.KITTI
  _partial_: false
  root: ${paths.data_dir}/kitti_data
  sequence_length: 11
  train_seqs: ['05', '07', '10']
  transform: 
    _target_: custom_transform.Compose
    _partial_: false
    transforms: 
    - _target_: custom_transform.ToTensor
    - _target_: custom_transform.Resize
